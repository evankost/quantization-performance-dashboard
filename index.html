<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Quantization Performance Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f4f7f9 0%, #e4e8f0 100%); 
            min-height: 100vh; 
            padding: 30px; 
            color: #333; 
            margin: 0;
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #2c3e50;
        }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px; margin-bottom: 40px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;}
        .dynamic-title { color: #2980b9; font-weight: 800; } 
        
        .controls { margin-bottom: 20px; display: flex; gap: 20px; align-items: center; background: #f1f3f5; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ced4da; font-size: 14px; cursor: pointer; transition: 0.3s opacity; }
        
        /* Unified hover effects */
        .bar, .stacked-rect { transition: 0.2s; cursor: pointer; }
        .bar:hover, .stacked-rect:hover { opacity: 0.85; stroke: #333; stroke-width: 1.5px; }
        
        .tooltip { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 10px; border-radius: 6px; font-size: 13px; pointer-events: none; opacity: 0; z-index: 10; line-height: 1.4; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .grid-line { stroke: #e0e0e0; stroke-opacity: 0.7; shape-rendering: crispEdges; }
    </style>
</head>
<body>

    <h1>Quantization Performance Dashboard</h1>

    <div class="card">
        <h2>1. Cost vs. Benefit Analysis — <span id="title-model-1" class="dynamic-title"></span></h2>
        
        <div class="controls" style="background: #eef2f5;">
            <label><strong>Model:</strong></label>
            <select id="modelFilter" style="font-weight: bold;"></select>

            <label style="margin-left: 20px;">Sort Chart By:</label>
            <select id="sortDiverging">
                <option value="pos-desc">Highest Quality (Benefits ↓)</option>
                <option value="pos-asc">Lowest Quality (Benefits ↑)</option>
                <option value="neg-asc">Lowest Cost (Overhead ↑)</option>
                <option value="neg-desc">Highest Cost (Overhead ↓)</option>
                <option value="alpha">Technique Name (A-Z)</option>
            </select>
        </div>

        <div id="diverging-chart"></div>
    </div>

    <div class="card">
        <h2>2. Metric Deep-Dive — <span id="title-model-2" class="dynamic-title"></span></h2>
        <div class="controls">
            <label>Metric:</label>
            <select id="metricFilter">
                <option value="GR-EN">GR-EN COMET Score</option>
                <option value="EN-GR">EN-GR COMET Score</option>
                <option value="T/S_GR_EN">Time/Sentence GR-EN (s)</option>
                <option value="T/S_EN_GR">Time/Sentence EN-GR (s)</option>
                <option value="VRAM_GB">VRAM Usage (GB)</option>
                <option value="RAM_GB">RAM Usage (GB)</option>
            </select>
            
            <label>Sort By:</label>
            <select id="sortOrder">
                <option value="value-desc">Value (High to Low)</option>
                <option value="value-asc">Value (Low to High)</option>
                <option value="alpha">Technique Name</option>
            </select>
        </div>
        <div id="sortable-chart"></div>
    </div>

    <div class="card">
        <h2>3. Cross-Model Comparison</h2>
        <p style="font-size: 14px; color: #555; margin-top: -10px; margin-bottom: 20px;">
            Compare all models simultaneously. <b>Hover over any point</b> to highlight how that specific quantization technique performs across all models.
        </p>
        <div class="controls">
            <label>X-Axis (Cost/Resource):</label>
            <select id="scatterX">
                <option value="VRAM_GB">VRAM Usage (GB)</option>
                <option value="RAM_GB">RAM Usage (GB)</option>
                <option value="T/S_GR_EN">Time/Sentence GR-EN (s)</option>
                <option value="T/S_EN_GR">Time/Sentence EN-GR (s)</option>
            </select>
            
            <label>Y-Axis (Quality/Benefit):</label>
            <select id="scatterY">
                <option value="GR-EN">GR-EN COMET Score</option>
                <option value="EN-GR">EN-GR COMET Score</option>
            </select>
        </div>
        <div id="scatter-chart"></div>
    </div>

    <div class="tooltip" id="main-tooltip"></div>

<script>
// --- CHART MARGINS ---
const margin1 = {top: 20, right: 40, bottom: 110, left: 80}; 
const margin2 = {top: 100, right: 40, bottom: 20, left: 160}; 
const margin3 = {top: 40, right: 160, bottom: 60, left: 60}; 
const fullWidth = 1000;
const width = fullWidth - margin1.left - margin1.right;

const tooltip = d3.select("#main-tooltip");

// --- DICTIONARIES & PALETTES ---
const metricNames = {
    "GR-EN": "GR-EN COMET Score",
    "EN-GR": "EN-GR COMET Score",
    "T/S_GR_EN": "Time/Sentence GR-EN (s)",
    "T/S_EN_GR": "Time/Sentence EN-GR (s)",
    "VRAM_GB": "VRAM Usage (GB)",
    "RAM_GB": "RAM Usage (GB)"
};

const negatives = ["RAM_GB", "VRAM_GB", "T/S_EN_GR", "T/S_GR_EN"]; 
const positives = ["GR-EN", "EN-GR"];                              
const allKeys = [].concat(negatives).reverse().concat(positives);

const colorScale = d3.scaleOrdinal()
    .domain(allKeys)
    .range(["#d7191c", "#fdae61", "#fee08b", "#abd9e9", "#4d9221", "#27ae60"]);

const modelColorScale = d3.scaleOrdinal(d3.schemeCategory10);

d3.csv("master_results.csv").then(rawData => {
    
    // Parse numeric fields securely
    rawData.forEach(d => {
        d["GR-EN"] = +d["GR-EN"]; 
        d["EN-GR"] = +d["EN-GR"];
        d["T/S_GR_EN"] = +d["T/S_GR_EN"]; 
        d["T/S_EN_GR"] = +d["T/S_EN_GR"];
        d.VRAM_GB = +d.VRAM_GB; 
        d.RAM_GB = +d.RAM_GB;
    });

    const aggregatedData = Array.from(
        d3.rollup(rawData, 
            v => ({
                "GR-EN": d3.mean(v, d => d["GR-EN"]),
                "EN-GR": d3.mean(v, d => d["EN-GR"]),
                "T/S_GR_EN": d3.mean(v, d => d["T/S_GR_EN"]),
                "T/S_EN_GR": d3.mean(v, d => d["T/S_EN_GR"]),
                "VRAM_GB": d3.mean(v, d => d.VRAM_GB),
                "RAM_GB": d3.mean(v, d => d.RAM_GB)
            }), 
            d => d.Model, d => d.Quantization
        ),
        ([model, quants]) => Array.from(quants, ([quant, values]) => ({
            model, quant, ...values
        }))
    ).flat();

    const models = [...new Set(aggregatedData.map(d => d.model))];
    const modelFilter = d3.select("#modelFilter");
    models.forEach(m => modelFilter.append("option").text(m).attr("value", m));

    // Disable Sort dropdowns if model has <= 1 quantization
    function updateSortControlsState() {
        const selectedModel = d3.select("#modelFilter").property("value");
        const quantCount = aggregatedData.filter(d => d.model === selectedModel).length;
        const isDisabled = quantCount <= 1;

        d3.selectAll("#sortOrder, #sortDiverging")
            .property("disabled", isDisabled)
            .style("opacity", isDisabled ? 0.4 : 1)
            .style("cursor", isDisabled ? "not-allowed" : "pointer");
    }

    updateSortControlsState();
    renderDivergingChart();
    renderSortableChart();
    renderScatterChart();

    // Event Listeners
    d3.select("#modelFilter").on("change", () => {
        updateSortControlsState(); 
        renderDivergingChart();
        renderSortableChart();
    });
    d3.selectAll("#metricFilter, #sortOrder").on("change", renderSortableChart);
    d3.select("#sortDiverging").on("change", renderDivergingChart);
    d3.selectAll("#scatterX, #scatterY").on("change", renderScatterChart);


    // --- 1. DIVERGING STACKED BAR CHART ---
    function renderDivergingChart() {
        const selectedModel = modelFilter.property("value");
        const sortMode = d3.select("#sortDiverging").property("value");
        const chartData = aggregatedData.filter(d => d.model === selectedModel);

        d3.select("#title-model-1").text(selectedModel);

        const maxes = {};
        allKeys.forEach(key => { maxes[key] = d3.max(chartData, d => d[key]) || 1; });

        const normalizedData = chartData.map(d => {
            let obj = { quant: d.quant, raw: d }; 
            allKeys.forEach(key => { obj[key] = d[key] / maxes[key]; });
            return obj;
        });

        normalizedData.sort((a, b) => {
            const benefitA = a["GR-EN"] + a["EN-GR"];
            const benefitB = b["GR-EN"] + b["EN-GR"];
            const costA = a["RAM_GB"] + a["VRAM_GB"] + a["T/S_EN_GR"] + a["T/S_GR_EN"];
            const costB = b["RAM_GB"] + b["VRAM_GB"] + b["T/S_EN_GR"] + b["T/S_GR_EN"];

            if (sortMode === "pos-desc") return benefitB - benefitA; 
            if (sortMode === "pos-asc") return benefitA - benefitB; 
            if (sortMode === "neg-asc") return costA - costB;       
            if (sortMode === "neg-desc") return costB - costA;      
            return a.quant.localeCompare(b.quant); 
        });

        const rowHeight = 35;
        const chartHeight = Math.max(chartData.length * rowHeight, 50);

        d3.select("#diverging-chart").selectAll("*").remove();

        const svg = d3.select("#diverging-chart").append("svg")
            .attr("viewBox", `0 0 ${fullWidth} ${chartHeight + margin2.top + margin2.bottom}`)
            .append("g").attr("transform", `translate(${margin2.left},${margin2.top})`);

        const signs = new Map([
            ...negatives.map(k => [k, -1]),
            ...positives.map(k => [k, 1])
        ]);

        const stackGenerator = d3.stack()
            .keys(allKeys)
            .value((d, key) => signs.get(key) * d[key])
            .offset(d3.stackOffsetDiverging);

        const series = stackGenerator(normalizedData);

        const extent = d3.extent(series.flat(2));
        const maxVal = Math.max(Math.abs(extent[0]), Math.abs(extent[1]));
        const paddedMax = maxVal * 1.05; 

        const x = d3.scaleLinear().domain([-paddedMax, paddedMax]).rangeRound([0, width]);
        const y = d3.scaleBand().domain(normalizedData.map(d => d.quant)).rangeRound([0, chartHeight]).padding(0.2);

        // TOP-LEFT LEGEND
        const legendGroup = svg.append("g").attr("transform", `translate(-150, -90)`);
        allKeys.forEach((key, i) => {
            const col = i % 2; 
            const row = Math.floor(i / 2); 
            const item = legendGroup.append("g").attr("transform", `translate(${col * 140}, ${row * 20})`); 
            item.append("rect").attr("width", 12).attr("height", 12).attr("fill", colorScale(key)).attr("rx", 2);
            item.append("text").attr("x", 18).attr("y", 10).style("font-size", "10px").style("fill", "#444").text(metricNames[key]); 
        });

        // SPLIT HEADER
        svg.append("text").attr("x", x(0) - 10).attr("y", -25).attr("text-anchor", "end").style("font-size", "11px").style("font-weight", "bold").style("fill", "#444").text("← Costs & Overhead (Resources & Compute Time)");
        svg.append("text").attr("x", x(0)).attr("y", -25).attr("text-anchor", "middle").style("font-size", "11px").style("font-weight", "bold").style("fill", "#bbb").text("|");
        svg.append("text").attr("x", x(0) + 10).attr("y", -25).attr("text-anchor", "start").style("font-size", "11px").style("font-weight", "bold").style("fill", "#444").text("Translation Quality (COMET Scores) →");
        svg.append("text").attr("x", x(0)).attr("y", -10).attr("text-anchor", "middle").style("font-size", "9px").style("fill", "#888").text("*Bar widths are normalized to their respective maximums, tooltips display true values.");

        svg.append("g")
            .selectAll("g").data(series).join("g").attr("fill", d => colorScale(d.key))
            .selectAll("rect").data(d => d.map(v => Object.assign(v, {key: d.key}))).join("rect")
            .attr("class", "stacked-rect").attr("x", d => x(d[0])).attr("y", d => y(d.data.quant))
            .attr("width", d => x(d[1]) - x(d[0])).attr("height", y.bandwidth())
            .on("mouseover", function(event, d) {
                const metricName = d.key;
                const rawValue = d.data.raw[metricName]; 
                tooltip.style("opacity", 1)
                       .html(`<b>${d.data.quant}</b><hr style="margin:4px 0; border:0; border-top:1px solid #555;">
                              <span style="color:${colorScale(metricName)}">■</span> <b>${metricNames[metricName]}:</b> ${rawValue.toFixed(4)}`)
                       .style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 40) + "px");
            })
            .on("mouseout", () => tooltip.style("opacity", 0));

        svg.append("g").call(d3.axisLeft(y).tickSizeOuter(0)).style("font-size", "12px");
        svg.append("line").attr("x1", x(0)).attr("x2", x(0)).attr("y1", 0).attr("y2", chartHeight).attr("stroke", "#333").attr("stroke-width", 2).attr("stroke-dasharray", "4,4");
    }

    // --- 2. SORTABLE VERTICAL BAR CHART ---
    function renderSortableChart() {
        const selectedModel = modelFilter.property("value");
        const selectedMetric = d3.select("#metricFilter").property("value");
        const sortMode = d3.select("#sortOrder").property("value");

        d3.select("#title-model-2").text(selectedModel);

        let filtered = aggregatedData.filter(d => d.model === selectedModel);

        if (sortMode === "value-desc") filtered.sort((a, b) => b[selectedMetric] - a[selectedMetric]);
        else if (sortMode === "value-asc") filtered.sort((a, b) => a[selectedMetric] - b[selectedMetric]);
        else filtered.sort((a, b) => a.quant.localeCompare(b.quant));

        const chartHeight = 350;
        const MAX_BAR_WIDTH = 80;

        d3.select("#sortable-chart").selectAll("*").remove();

        const svg = d3.select("#sortable-chart").append("svg")
            .attr("viewBox", `0 0 ${fullWidth} ${chartHeight + margin1.top + margin1.bottom}`)
            .append("g").attr("transform", `translate(${margin1.left}, ${margin1.top})`);

        const x = d3.scaleBand().range([0, width]).domain(filtered.map(d => d.quant)).padding(0.25);
        const y = d3.scaleLinear().range([chartHeight, 0]).domain([0, d3.max(filtered, d => d[selectedMetric]) * 1.1]);

        svg.append("g").attr("transform", `translate(0,${chartHeight})`).call(d3.axisBottom(x))
           .selectAll("text").attr("transform", "translate(-10, 5) rotate(-45)").style("text-anchor", "end");
        svg.append("g").call(d3.axisLeft(y));

        svg.selectAll(".bar").data(filtered).join("rect")
            .attr("class", "bar")
            .attr("x", d => {
                const bw = x.bandwidth();
                const actualWidth = Math.min(bw, MAX_BAR_WIDTH);
                return x(d.quant) + (bw - actualWidth) / 2;
            })
            .attr("y", d => y(d[selectedMetric]))
            .attr("width", d => Math.min(x.bandwidth(), MAX_BAR_WIDTH))
            .attr("height", d => chartHeight - y(d[selectedMetric]))
            .attr("fill", colorScale(selectedMetric)).attr("rx", 6)
            .on("mouseover", (event, d) => {
                tooltip.style("opacity", 1).html(`<b>${d.quant}</b><br>${metricNames[selectedMetric]}: ${d[selectedMetric].toFixed(4)}`)
                       .style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", () => tooltip.style("opacity", 0));
    }

    // --- 3. CROSS-MODEL SCATTER PLOT ---
    function renderScatterChart() {
        const xMetric = d3.select("#scatterX").property("value");
        const yMetric = d3.select("#scatterY").property("value");

        const chartHeight = 400;
        const scatterWidth = fullWidth - margin3.left - margin3.right;

        d3.select("#scatter-chart").selectAll("*").remove();

        const svg = d3.select("#scatter-chart").append("svg")
            .attr("viewBox", `0 0 ${fullWidth} ${chartHeight + margin3.top + margin3.bottom}`)
            .append("g").attr("transform", `translate(${margin3.left},${margin3.top})`);

        const xMax = d3.max(aggregatedData, d => d[xMetric]);
        const yMax = d3.max(aggregatedData, d => d[yMetric]);
        const yMin = d3.min(aggregatedData, d => d[yMetric]);

        const x = d3.scaleLinear().domain([0, xMax * 1.05]).range([0, scatterWidth]);
        const y = d3.scaleLinear().domain([yMin * 0.9, yMax * 1.05]).range([chartHeight, 0]);

        svg.append("g").attr("class", "grid").attr("transform", `translate(0,${chartHeight})`)
           .call(d3.axisBottom(x).tickSize(-chartHeight).tickFormat("")).selectAll("line").attr("class", "grid-line");
        svg.append("g").attr("class", "grid")
           .call(d3.axisLeft(y).tickSize(-scatterWidth).tickFormat("")).selectAll("line").attr("class", "grid-line");

        svg.append("g").attr("transform", `translate(0,${chartHeight})`).call(d3.axisBottom(x));
        svg.append("g").call(d3.axisLeft(y));

        svg.append("text").attr("text-anchor", "middle").attr("x", scatterWidth / 2).attr("y", chartHeight + 40).text(metricNames[xMetric]);
        svg.append("text").attr("text-anchor", "middle").attr("transform", "rotate(-90)").attr("y", -45).attr("x", -chartHeight / 2).text(metricNames[yMetric]);

        // --- NEW: INITIALIZE IN-CHART TECHNIQUE LABEL ---
        // Places an empty text placeholder inside the top right corner of the plot arena
        const internalTitle = svg.append("text")
            .attr("x", scatterWidth / 2)
            .attr("y", -15)
            .attr("text-anchor", "middle")
            .style("font-size", "12px")
            .style("font-weight", "bold")
            .style("fill", "#2980b9");
        // ------------------------------------------------

        // Draw the dots
        svg.append('g').selectAll("dot").data(aggregatedData).enter().append("circle")
            .attr("class", "scatter-dot")
            .attr("cx", d => x(d[xMetric])).attr("cy", d => y(d[yMetric]))
            .attr("r", 7)
            .style("fill", d => modelColorScale(d.model))
            .style("opacity", 0.75)
            .style("stroke", "white").style("stroke-width", 1)
            .on("mouseover", function(event, d) {
                // Show tooltip
                tooltip.style("opacity", 1).html(`
                    <b>Model:</b> ${d.model}<br>
                    <b>Quant:</b> ${d.quant}<hr style="margin:4px 0; border:0; border-top:1px solid #555;">
                    <b>${metricNames[xMetric]}:</b> ${d[xMetric].toFixed(4)}<br>
                    <b>${metricNames[yMetric]}:</b> ${d[yMetric].toFixed(4)}
                `).style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 40) + "px");

                // UPDATE IN-CHART SVG LABEL
                internalTitle.text(`Quantization Technique: ${d.quant}`);

                // Highlight matching quantization techniques, fade out the rest
                svg.selectAll(".scatter-dot")
                    .transition().duration(200)
                    .style("opacity", dotData => dotData.quant === d.quant ? 1 : 0.15)
                    .attr("r", dotData => dotData.quant === d.quant ? 9 : 7)
                    .style("stroke", dotData => dotData.quant === d.quant ? "#111" : "white")
                    .style("stroke-width", dotData => dotData.quant === d.quant ? 2 : 1);
            })
            .on("mouseout", function() {
                // Hide tooltip
                tooltip.style("opacity", 0);

                // RESET IN-CHART SVG LABEL
                internalTitle.text("");

                // Restore all dots back to normal
                svg.selectAll(".scatter-dot")
                    .transition().duration(200)
                    .style("opacity", 0.75)
                    .attr("r", 7)
                    .style("stroke", "white")
                    .style("stroke-width", 1);
            });

        const legend = svg.selectAll(".legend").data(models).enter().append("g")
            .attr("transform", (d, i) => `translate(${scatterWidth + 20}, ${i * 25})`);
        
        legend.append("rect").attr("width", 14).attr("height", 14).style("fill", d => modelColorScale(d)).attr("rx", 3);
        legend.append("text").attr("x", 22).attr("y", 11).text(d => d).style("font-size", "12px").style("alignment-baseline", "middle");
    }
});
</script>
</body>
</html>
